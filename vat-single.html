<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6 !important;
      color: #111111 !important;
      margin: 0;
      padding: 20px 22px;
      box-sizing: border-box;
    }
    .formula {
      text-align: center;
      color: #5b5b5b;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin: 14px 0 6px 0;
      font-size: 15px;
      font-weight: 500;
      color: #111111 !important;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #c9c9c9;
      border-radius: 12px;
      background: #f8f8f8;
      color: #111111;
      font-size: 15px;
      font-family: inherit;
      box-sizing: border-box;
    }
    input[type="number"]:focus { outline: none; border-color: #1a73e8; }
    button { border: none; cursor: pointer; }
    #calculateBtn {
      width: 100%;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #1a73e8;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
    }
    #calculateBtn:hover { background: #1557b0; }
    #result {
      margin-top: 16px;
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
      color: #111111;
    }
    .calculated-as {
      margin-top: 4px;
      font-size: 12px;
      font-style: italic;
      color: #666;
    }
  </style>
</head>
<body>
  <p class="formula">Tax = Gross / (1 + Tax%) × Tax%</p>

  <label for="gross">Gross amount</label>
  <input id="gross" type="number" step="0.01" placeholder="e.g. 1000.00" />

  <label for="rate">Tax percentage (%)</label>
  <input id="rate" type="number" step="0.01" placeholder="e.g. 7" />

  <button id="calculateBtn">Calculate</button>
  <div id="result"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('calculateBtn').addEventListener('click', calculate);
    });

    function calculate() {
      const gross = parseFloat(document.getElementById('gross').value);
      const rate  = parseFloat(document.getElementById('rate').value);
      const result = document.getElementById('result');
      if (isNaN(gross) || isNaN(rate)) { result.innerHTML = 'Please enter valid values.'; return; }
      const r = rate / 100;
      const net = gross / (1 + r);
      const tax = gross - net;
      result.innerHTML =
        '<strong>Tax:</strong> ' + tax.toFixed(2) + '<br>' +
        '<strong>Net:</strong> ' + net.toFixed(2) + '<br>' +
        '<div class="calculated-as">Calculated as: ' + gross.toFixed(2) +
        ' / (1 + ' + r.toFixed(4) + ') × ' + r.toFixed(4) + '</div>';
    }
  </script>
</body>
</html>
